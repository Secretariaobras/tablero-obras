
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Obras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-6xl mx-auto px-4 md:px-8 py-10">
        <header class="mb-10 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-200 mb-4">
                <i data-lucide="hard-hat" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-800 mb-2">Tablero de Obras</h1>
            <p class="text-slate-400 text-sm">2 proyecto(s) — hacé clic en una tarjeta para ver el detalle</p>
        </header>
        
    <div class="mb-10">
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
            <i data-lucide="folder" class="w-4 h-4"></i> OBR-111
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    
        <a href="OBR-111_Pavimentos_articulados.html" class="group block bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md hover:border-indigo-300 transition-all">
            <div class="flex justify-between items-start mb-3">
                <h3 class="font-bold text-slate-800 text-sm leading-snug group-hover:text-indigo-600 transition-colors">Pavimentos articulados</h3>
                <span class="ml-2 shrink-0 px-2 py-1 rounded-md text-[10px] font-bold border bg-red-100 text-red-700 border-red-200">En Gestión</span>
            </div>
            <div class="flex items-center gap-1 mb-3">
                <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div class="bg-indigo-500 h-2 rounded-full" style="width:0%"></div>
                </div>
                <span class="text-xs font-black text-indigo-600 ml-2">0%</span>
            </div>
            <div class="flex justify-between text-[11px] text-slate-400 font-medium">
                <span>Adj: <span class="text-slate-600 font-bold">$0.0M</span></span>
                <span>Pag: <span class="text-green-600 font-bold">$0.0M</span></span>
                <span>1 OC</span>
            </div>
        </a>
        </div></div>
    <div class="mb-10">
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
            <i data-lucide="folder" class="w-4 h-4"></i> OBR86
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    
        <a href="OBR86_Corredor_Aerobico.html" class="group block bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md hover:border-indigo-300 transition-all">
            <div class="flex justify-between items-start mb-3">
                <h3 class="font-bold text-slate-800 text-sm leading-snug group-hover:text-indigo-600 transition-colors">Corredor Aerobico</h3>
                <span class="ml-2 shrink-0 px-2 py-1 rounded-md text-[10px] font-bold border bg-amber-100 text-amber-700 border-amber-200">En Ejecución</span>
            </div>
            <div class="flex items-center gap-1 mb-3">
                <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div class="bg-indigo-500 h-2 rounded-full" style="width:48%"></div>
                </div>
                <span class="text-xs font-black text-indigo-600 ml-2">48%</span>
            </div>
            <div class="flex justify-between text-[11px] text-slate-400 font-medium">
                <span>Adj: <span class="text-slate-600 font-bold">$1094.7M</span></span>
                <span>Pag: <span class="text-green-600 font-bold">$521.3M</span></span>
                <span>2 OCs</span>
            </div>
        </a>
        </div></div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
